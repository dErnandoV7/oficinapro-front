<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0b0b0f; }
      .fg-fill { fill: #ffffff; }
      .fg-stroke { stroke: #ffffff; }
      .accent-fill { fill: #f97316; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #ffffff; }
      .fg-fill { fill: #0b0b0f; }
      .fg-stroke { stroke: #0b0b0f; }
      .accent-fill { fill: #f97316; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="180" height="180" rx="36" />

  <!-- Monograma "OP" -->
  <g>
    <!-- brilho sutil -->
    <circle class="fg-fill" cx="90" cy="90" r="60" opacity="0.08" />

    <!-- O -->
    <circle
      cx="64"
      cy="92"
      r="28"
      class="fg-stroke"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- P -->
    <path
      class="accent-fill"
      fill-rule="evenodd"
      clip-rule="evenodd"
      d="M96 132V60H124C142 60 152 70.4 152 86C152 101.6 142 112 124 112H110V132H96ZM110 100H124C134.5 100 140 94.7 140 86C140 77.3 134.5 72 124 72H110V100Z"
    />

    <!-- detalhe de base pra dar peso em tamanhos pequenos -->
    <rect class="fg-fill" x="44" y="136" width="92" height="10" rx="5" opacity="0.18" />
  </g>
</svg>
